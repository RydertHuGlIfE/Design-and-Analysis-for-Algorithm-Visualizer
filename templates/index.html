<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Visualizer</title>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>DAA Visualizer</h1>
        </div>

        <div class="buttons">
            <div class="button-group">
                <button onclick="startMergeSort()">Merge Sort</button>
                <button onclick="startQuickSort()">Quick Sort</button>
                <button onclick="startHeapSort()">Heap Sort</button>
                <button onclick="startbubbleSort()">Bubble Sort</button>
                <button onclick="startInsertionSort()">Insertion Sort</button>
                <button onclick="startSelectionSort()">Selection Sort</button>
            </div>
            <div class="button-group" style="margin-top: 1rem; grid-template-columns: repeat(4, 1fr);">
                <button onclick="startTreeVisualizer('build')" style="background: #10b981;">BST: Build</button>
                <button onclick="startTreeVisualizer('inorder')" style="background: #059669;">BST: Inorder</button>
                <button onclick="startTreeVisualizer('preorder')" style="background: #047857;">BST: Preorder</button>
                <button onclick="startTreeVisualizer('postorder')" style="background: #065f46;">BST: Postorder</button>
            </div>
            <div class="button-group" style="margin-top: 1rem; grid-template-columns: repeat(3, 1fr);">
                <button onclick="startKnapsack()" style="background: #7c3aed;">⚖️ 0/1 Knapsack</button>
                <button onclick="startMCM()" style="background: #9333ea;">🧩 Matrix Chain</button>
                <button onclick="startHuffman()" style="background: #a855f7;">🌳 Huffman Coding</button>
            </div>
            <div class="speed-control">
                <label for="speed-slider">Animation Speed</label>
                <input type="range" id="speed-slider" min="1" max="400" value="50">
                <span id="speed-value">50ms</span>
            </div>
        </div>

        <div id="status-info" class="status-info"></div>

        <div id="bar-container" class="bar-container">
            <!-- Bars will be generated here -->
        </div>

        <div id="tree-container" class="tree-container" style="display: none;">
            <svg id="tree-svg" width="100%" height="500"></svg>
        </div>

        <div id="knapsack-container" class="knapsack-container" style="display: none;"></div>
        <div id="mcm-container" class="mcm-container" style="display: none;"></div>
        <div id="huffman-container" class="huffman-container" style="display: none;"></div>
    </div>

    <script>
        const algoMetadata = {
            'Merge Sort': {
                complexity: 'O(n log n)', case: 'Stable'
            },
            'Quick Sort': {
                complexity: 'O(n log n)', case: 'Unstable'
            },
            'Bubble Sort': {
                complexity: 'O(n^2)', case: 'Stable'
            },
            'Insertion Sort': {
                complexity: 'O(n^2)', case: 'Stable'
            },
            'Selection Sort': {
                complexity: 'O(n^2)', case: 'Unstable'
            }
        };

        const verticalGAP = 80;
        let treeBuilt = false;
        let treeBaseGap = 220;
        let treeCenterX = 450;
        const treeNodes = {}; // global: id -> { x, y, val }


        function getpos(parentX, parentY, depth, direction, baseGap) {
            const xoffset = baseGap / Math.pow(2, depth - 1);
            const x = (direction === 'L') ? parentX - xoffset : parentX + xoffset;
            const y = parentY + verticalGAP;
            return { x, y };
        }

        function drawNode(svg, id, x, y, val, pid) {
            if (pid !== '-1' && treeNodes[pid]) {
                const p = treeNodes[pid];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                line.setAttribute("x2", x);   line.setAttribute("y2", y);
                line.classList.add("edge");
                svg.appendChild(line);
            }
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x); circle.setAttribute("cy", y);
            circle.setAttribute("r", 20); circle.setAttribute("id", `node-${id}`);
            circle.classList.add("node");
            svg.appendChild(circle);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x); text.setAttribute("y", y + 5);
            text.setAttribute("text-anchor", "middle");
            text.classList.add("node-text");
            text.textContent = val;
            svg.appendChild(text);
        }

        async function buildTree(svg, steps, animated) {
            const nodeCount = steps.filter(s => s.startsWith('NODE')).length;
            treeBaseGap = Math.max(220, nodeCount * 25);
            treeCenterX = svg.getBoundingClientRect().width / 2 || 450;

            for (const step of steps) {
                const parts = step.split(' ');
                const stepType = parts[0];

                if (stepType === 'NODE') {
                    const id = parts[1], val = parts[2], pid = parts[3], dir = parts[4];
                    let x, y;
                    if (pid === '-1') {
                        x = treeCenterX; y = 50;
                    } else {
                        const parent = treeNodes[pid];
                        const depth = Math.floor((parent.y - 50) / verticalGAP) + 1;
                        const pos = getpos(parent.x, parent.y, depth, dir, treeBaseGap);
                        x = pos.x; y = pos.y;
                    }
                    treeNodes[id] = { x, y, val };
                    drawNode(svg, id, x, y, val, pid);
                    if (animated) await sleep(animationSpeed);

                } else if (stepType === 'CMP' && animated) {
                    const nodeEl = document.getElementById(`node-${parts[1]}`);
                    if (nodeEl) {
                        nodeEl.classList.add('comparing');
                        await sleep(animationSpeed);
                        nodeEl.classList.remove('comparing');
                    }
                }
            }
            treeBuilt = true;
        }

        function setView(active) {
            container.style.display = (active === 'bars') ? 'flex' : 'none';
            document.getElementById('tree-container').style.display = (active === 'tree') ? 'block' : 'none';
            document.getElementById('knapsack-container').style.display = (active === 'knapsack') ? 'block' : 'none';
            document.getElementById('mcm-container').style.display = (active === 'mcm') ? 'block' : 'none';
            document.getElementById('huffman-container').style.display = (active === 'huffman') ? 'block' : 'none';
        }

        async function startMCM() {
            setView('mcm');
            statusElement.innerHTML = `<span class="complexity-info">Running Matrix Chain Multiplication...</span>`;
            
            const response = await fetch('/mcm');
            const data = await response.json();
            const container = document.getElementById('mcm-container');
            container.innerHTML = '<h3>Matrix Chain Multiplication — DP Table</h3>';
            
            let n = 0;
            const dims = [];
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') n = parseInt(parts[1]);
                if (parts[0] === 'DIM') dims.push({ i: parts[1], r: parts[2], c: parts[3] });
            }

            const dimsDiv = document.createElement('div');
            dimsDiv.className = 'mcm-dims';
            dims.forEach(d => {
                const span = document.createElement('span');
                span.className = 'mcm-dim-badge';
                span.textContent = `M${d.i}: ${d.r}×${d.c}`;
                dimsDiv.appendChild(span);
            });
            container.appendChild(dimsDiv);

            const table = document.createElement('table');
            table.className = 'dp-table';
            
            // Header
            const hrow = document.createElement('tr');
            hrow.innerHTML = `<th class="dp-corner">i\\j</th>`;
            for (let j = 1; j <= n; j++) hrow.innerHTML += `<th class="dp-col-header">${j}</th>`;
            table.appendChild(hrow);

            for (let i = 1; i <= n; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `<th class="dp-row-header"><span>Row ${i}</span></th>`;
                for (let j = 1; j <= n; j++) {
                    const td = document.createElement('td');
                    td.id = `mcm-cell-${i}-${j}`;
                    td.className = 'dp-cell';
                    if (i > j) td.classList.add('dp-inactive');
                    else if (i === j) {
                        td.classList.add('dp-diagonal');
                        td.textContent = '0';
                    } else td.textContent = '∞';
                    row.appendChild(td);
                }
                table.appendChild(row);
            }
            container.appendChild(table);

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CELL') {
                    const i = parts[1], j = parts[2], val = parts[3];
                    const cell = document.getElementById(`mcm-cell-${i}-${j}`);
                    cell.textContent = val;
                    cell.classList.add('dp-filling');
                    await sleep(animationSpeed);
                    cell.classList.remove('dp-filling');
                    cell.classList.add('dp-filled');
                    if (i == 1 && j == n) cell.classList.add('dp-optimal-cell');
                } else if (parts[0] === 'OPTIMAL') {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'mcm-optimal';
                    optDiv.innerHTML = `<strong>Min Cost: ${parts[1]}</strong><br>Optimal Parantheses: ${parts[2]}`;
                    container.appendChild(optDiv);
                    statusElement.innerHTML = `<span class="success-text">MCM Complete! Optimal Cost: ${parts[1]}</span>`;
                }
            }
        }

        async function startHuffman() {
            setView('huffman');
            statusElement.innerHTML = `<span class="complexity-info">Running Huffman Coding...</span>`;

            const response = await fetch('/huffman');
            const data = await response.json();
            const container = document.getElementById('huffman-container');
            container.innerHTML = '<h3>Huffman Coding — Tree & Codes</h3>';

            const logDiv = document.createElement('div');
            logDiv.className = 'huff-log';
            container.appendChild(logDiv);

            const qDiv = document.createElement('div');
            qDiv.className = 'huff-queue';
            container.appendChild(qDiv);

            const svgDiv = document.createElement('div');
            svgDiv.className = 'tree-container';
            svgDiv.innerHTML = '<svg id="huff-svg" width="100%" height="400"></svg>';
            container.appendChild(svgDiv);

            const codesDiv = document.createElement('div');
            codesDiv.className = 'huff-code-section';
            codesDiv.innerHTML = '<h4>Character Codes</h4><table class="dp-table" id="huff-code-table"><tr><th class="dp-col-header">Char</th><th class="dp-col-header">Code</th></tr></table>';
            container.appendChild(codesDiv);

            const svg = document.getElementById('huff-svg');
            const nodes = {};
            const centerX = svg.clientWidth / 2 || 450;
            let stepNum = 1;

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'LEAF') {
                    const id = parts[1], ch = parts[2], fr = parts[3];
                    const card = document.createElement('div');
                    card.id = `huff-card-${id}`;
                    card.className = 'huff-card';
                    card.innerHTML = `<b>${ch}</b><small>${fr}</small>`;
                    qDiv.appendChild(card);
                } else if (parts[0] === 'MERGE') {
                    const l = parts[1], r = parts[2], id = parts[3], fr = parts[4];
                    const cl = document.getElementById(`huff-card-${l}`);
                    const cr = document.getElementById(`huff-card-${r}`);
                    
                    cl.classList.add('huff-extracting');
                    await sleep(animationSpeed);
                    cr.classList.add('huff-extracting');
                    await sleep(animationSpeed);

                    const entry = document.createElement('div');
                    entry.className = 'huff-log-entry';
                    entry.innerHTML = `<span class="huff-step-num">#${stepNum++}</span> Merged nodes ${l} and ${r} → New freq ${fr}`;
                    logDiv.appendChild(entry);
                    logDiv.scrollTop = logDiv.scrollHeight;

                    cl.classList.remove('huff-extracting');
                    cr.classList.remove('huff-extracting');
                    cl.classList.add('huff-extracted');
                    cr.classList.add('huff-extracted');

                    const card = document.createElement('div');
                    card.id = `huff-card-${id}`;
                    card.className = 'huff-card huff-internal';
                    card.innerHTML = `<b>*</b><small>${fr}</small>`;
                    qDiv.appendChild(card);
                    await sleep(animationSpeed);

                } else if (parts[0] === 'TNODE') {
                    const id = parts[1], pid = parts[2], dir = parts[3], fr = parts[4], lbl = parts[5];
                    let x, y;
                    if (pid === '-1') { x = centerX; y = 40; }
                    else {
                        const p = nodes[pid];
                        const depth = Math.floor((p.y - 40) / 70) + 1;
                        const xoffset = 180 / Math.pow(2, depth - 1);
                        x = (dir === 'L') ? p.x - xoffset : p.x + xoffset;
                        y = p.y + 70;

                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                        line.setAttribute("x2", x);   line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                    }
                    nodes[id] = { x, y };
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", x); circle.setAttribute("cy", y);
                    circle.setAttribute("r", 18);
                    circle.id = `huff-node-${id}`;
                    circle.setAttribute("class", (lbl==='*') ? "node" : "node huff-leaf-circle");
                    svg.appendChild(circle);

                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", x); txt.setAttribute("y", y + 4);
                    txt.setAttribute("text-anchor", "middle");
                    txt.setAttribute("class", "node-text");
                    txt.textContent = (lbl==='*') ? fr : lbl;
                    svg.appendChild(txt);
                    await sleep(animationSpeed / 2);

                } else if (parts[0] === 'CODE') {
                    const table = document.getElementById('huff-code-table');
                    const row = document.createElement('tr');
                    row.innerHTML = `<td class="dp-cell dp-filled">${parts[1]}</td><td class="dp-cell dp-filled">${parts[2]}</td>`;
                    table.appendChild(row);
                }
            }
            statusElement.innerHTML = `<span class="success-text">Huffman Coding Complete!</span>`;
        }


        async function startKnapsack() {
            setView('knapsack');
            statusElement.innerHTML = `<span class="complexity-info">Running 0/1 Knapsack DP...</span>`;

            const response = await fetch('/knapsack');
            const data = await response.json();

            const kDiv = document.getElementById('knapsack-container');
            kDiv.innerHTML = '<h3>0/1 Knapsack — DP Table (dp[item][capacity])</h3>';

            let n = 0, W = 0;
            const itemDefs = {};
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') { n = parseInt(parts[1]); W = parseInt(parts[2]); }
                else if (parts[0] === 'DEF') { itemDefs[parseInt(parts[1])] = { w: parseInt(parts[2]), v: parseInt(parts[3]) }; }
            }

            // Build table
            const table = document.createElement('table');
            table.className = 'dp-table';

            // Header row
            const hdr = document.createElement('tr');
            const corner = document.createElement('th');
            corner.textContent = 'Item \ Cap';
            corner.className = 'dp-corner';
            hdr.appendChild(corner);
            for (let j = 0; j <= W; j++) {
                const th = document.createElement('th');
                th.textContent = j;
                th.className = 'dp-col-header';
                hdr.appendChild(th);
            }
            table.appendChild(hdr);

            // Data rows
            for (let i = 0; i <= n; i++) {
                const tr = document.createElement('tr');
                const th = document.createElement('th');
                th.id = `row-hdr-${i}`;
                th.className = 'dp-row-header';
                if (i === 0) {
                    th.innerHTML = '<span>∅ (none)</span><small>baseline</small>';
                } else {
                    const it = itemDefs[i];
                    th.innerHTML = `<span>Item ${i}</span><small>w=${it.w}, v=${it.v}</small>`;
                }
                tr.appendChild(th);
                for (let j = 0; j <= W; j++) {
                    const td = document.createElement('td');
                    td.id = `cell-${i}-${j}`;
                    td.className = 'dp-cell';
                    td.textContent = '–';
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            kDiv.appendChild(table);

            // Animate steps
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CELL') {
                    const i = parseInt(parts[1]), j = parseInt(parts[2]), val = parseInt(parts[3]);
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    if (cell) {
                        cell.textContent = val;
                        cell.classList.add('dp-filling');
                        await sleep(animationSpeed);
                        cell.classList.remove('dp-filling');
                        cell.classList.add('dp-filled');
                    }
                } else if (parts[0] === 'PICK') {
                    const i = parseInt(parts[1]);
                    document.getElementById(`row-hdr-${i}`)?.classList.add('dp-picked');
                    for (let j = 0; j <= W; j++)
                        document.getElementById(`cell-${i}-${j}`)?.classList.add('dp-picked');
                    await sleep(animationSpeed * 3);
                } else if (parts[0] === 'MAX') {
                    statusElement.innerHTML = `<span class="success-text">Max Value = ${parts[1]}</span><span class="complexity-info">0/1 Knapsack · O(nW) time &amp; space</span>`;
                }
            }
        }

        async function startTreeVisualizer(type = 'build') {
            setView('tree');
            statusElement.innerHTML = `<span class="complexity-info">Running ${type.toUpperCase()}...</span>`;

            const svg = document.getElementById('tree-svg');

            if (type === 'build') {
                // Full clear and animated rebuild
                svg.innerHTML = '';
                Object.keys(treeNodes).forEach(k => delete treeNodes[k]);
                treeBuilt = false;
                await sleep(50); // let browser compute SVG width
                const response = await fetch('/tree/build');
                const data = await response.json();
                await buildTree(svg, data.steps, true);

            } else {
                // Traversal: ensure tree is drawn first
                if (!treeBuilt) {
                    svg.innerHTML = '';
                    Object.keys(treeNodes).forEach(k => delete treeNodes[k]);
                    await sleep(50);
                    // Build silently (instant) from build endpoint
                    const buildRes = await fetch('/tree/build');
                    const buildData = await buildRes.json();
                    await buildTree(svg, buildData.steps, false);
                }

                // Clear previous traversal highlights
                document.querySelectorAll('#tree-svg .node').forEach(n => {
                    n.classList.remove('active', 'comparing');
                });

                // Fetch and animate traversal ACT steps only
                const response = await fetch(`/tree/${type}`);
                const data = await response.json();

                for (const step of data.steps) {
                    const parts = step.split(' ');
                    if (parts[0] === 'ACT') {
                        const nodeEl = document.getElementById(`node-${parts[1]}`);
                        if (nodeEl) {
                            nodeEl.classList.add('active');
                            await sleep(animationSpeed);
                        }
                    }
                }
            }

            statusElement.innerHTML = `<span class="success-text">${type.toUpperCase()} Complete!</span>`;
        }



        const container = document.getElementById('bar-container');
        const statusElement = document.getElementById('status-info');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        let animationSpeed = parseInt(speedSlider.value);
        let array = [120, 350, 50, 560, 200, 410, 80, 5, 290, 480, 150, 310, 220, 600, 100, 450, 30, 520, 180, 390];

        speedSlider.oninput = function () {
            animationSpeed = parseInt(this.value);
            speedValue.innerText = `${this.value}ms`;
        }

        function createBars() {
            container.innerHTML = '';
            statusElement.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 0.5}px`;
                container.appendChild(bar);
            });
        }

        function onSortComplete(algoName) {
            const meta = algoMetadata[algoName];
            statusElement.innerHTML = `
                <span class="success-text">Array Sorted!</span>
                <span class="complexity-info">Time Complexity: ${meta.complexity}</span>
            `;
        }


        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));


        async function startSelectionSort() {
            setView('bars');
            const response = await fetch('/selectionsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(" ");
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Selection Sort');
        }

        async function startInsertionSort() {
            setView('bars');
            const response = await fetch('/insertionsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar')

            for (const step of data.steps) {
                const parts = step.split(" ");
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Insertion Sort');
        }


        async function startHeapSort() {
            setView('bars');
            const response = await fetch('/heapsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Heap Sort');
        }

        async function startMergeSort() {
            setView('bars');
            const response = await fetch('/mergesort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }

            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Merge Sort');
        }


        async function startbubbleSort() {
            setView('bars');
            const response = await fetch('/bubblesort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar')

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type == 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type == 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Bubble Sort');
        }

        async function startQuickSort() {
            setView('bars');

            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    bars[i].style.backgroundColor = '#f59e0b';
                    bars[j].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                    bars[j].style.backgroundColor = '#6366f1';
                } else if (type === 'UPD') {
                    bars[i].style.height = `${j * 0.5}px`;
                    bars[i].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Quick Sort');
        }


        createBars();
