<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Visualizer | Digital Astral</title>
</head>
<body>
    <div class="cockpit">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div style="width: 32px; height: 32px; background: var(--grad-primary); border-radius: 8px;"></div>
                <h1>DAA LAB</h1>
            </div>
            
            <div style="flex: 1; overflow-y: auto;">
                <nav class="nav-section">
                    <h3><span>•</span> Sorting</h3>
                    <div class="nav-buttons">
                        <button class="nav-btn" data-algo="Merge Sort" onclick="startMergeSort()">Merge Sort</button>
                        <button class="nav-btn" data-algo="Quick Sort" onclick="startQuickSort()">Quick Sort</button>
                        <button class="nav-btn" data-algo="Heap Sort" onclick="startHeapSort()">Heap Sort</button>
                        <button class="nav-btn" data-algo="Bubble Sort" onclick="startbubbleSort()">Bubble Sort</button>
                        <button class="nav-btn" data-algo="Insertion Sort" onclick="startInsertionSort()">Insertion Sort</button>
                        <button class="nav-btn" data-algo="Selection Sort" onclick="startSelectionSort()">Selection Sort</button>
                    </div>
                </nav>

                <nav class="nav-section" style="margin-top: 2rem;">
                    <h3><span>•</span> Trees</h3>
                    <div class="nav-buttons">
                        <button class="nav-btn" data-algo="BST" onclick="startTreeVisualizer('build')">BST: Build</button>
                        <button class="nav-btn" data-algo="BST" onclick="startTreeVisualizer('inorder')">BST: Inorder</button>
                        <button class="nav-btn" data-algo="BST" onclick="startTreeVisualizer('preorder')">BST: Preorder</button>
                        <button class="nav-btn" data-algo="BST" onclick="startTreeVisualizer('postorder')">BST: Postorder</button>
                    </div>
                </nav>

                <nav class="nav-section" style="margin-top: 2rem;">
                    <h3><span>•</span> Advanced</h3>
                    <div class="nav-buttons">
                        <button class="nav-btn" data-algo="Knapsack" onclick="startKnapsack()">⚖️ 0/1 Knapsack</button>
                        <button class="nav-btn" data-algo="Matrix Chain" onclick="startMCM()">🧩 Matrix Chain</button>
                        <button class="nav-btn" data-algo="Huffman" onclick="startHuffman()">🌳 Huffman Coding</button>
                    </div>
                </nav>
            </div>
        </aside>

        <!-- Header -->
        <header class="header">
            <div class="current-algo-title" id="active-algo-name">Initializing Command Center...</div>
            <div id="status-info" class="header-status">Standby</div>
        </header>

        <!-- Dashboard -->
        <main class="dashboard">
            <div id="viz-glass" class="glass-panel">
                <div id="bar-container" class="bar-container" style="display: none;"></div>
                <div id="tree-container" class="tree-container" style="display: none; width: 100%; height: 100%;">
                    <svg id="tree-svg" width="100%" height="100%"></svg>
                </div>
                <div id="knapsack-container" class="knapsack-container" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
                    <div id="kp-data" class="ref-data-panel" style="width: 100%; max-height: 150px; overflow-y: auto;"></div>
                    <div id="kp-viz-wrapper" style="width: 100%; display: flex; justify-content: center;"></div>
                </div>
                <div id="mcm-container" class="mcm-container" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
                    <div id="mcm-dims" class="ref-data-panel" style="width: 100%; max-height: 150px; overflow-y: auto;"></div>
                    <div id="mcm-viz-wrapper" style="width: 100%; display: flex; justify-content: center;"></div>
                </div>
                <div id="huffman-container" class="huffman-container" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
                    <div id="hf-data" class="ref-data-panel" style="width: 100%; max-height: 100px; overflow-y: auto;"></div>
                    <div id="hf-tree-wrapper" style="width: 100%; height: 400px; position: relative;">
                        <svg id="hf-svg" width="100%" height="100%"></svg>
                    </div>
                    <div id="hf-codes" style="width: 100%; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px;"></div>
                </div>
            </div>
        </main>

        <!-- Analysis Panel -->
        <aside class="data-panel">
            <div class="data-card">
                <h4>Dynamic Analysis</h4>
                <div class="complexity-grid">
                    <div class="metric">
                        <b>Time</b>
                        <span id="time-complexity">O(—)</span>
                    </div>
                    <div class="metric">
                        <b>Space</b>
                        <span id="space-complexity">O(—)</span>
                    </div>
                </div>
            </div>

            <div class="data-card" style="flex: 1; overflow-y: auto;">
                <h4>Step Insights</h4>
                <div id="step-desc" style="font-size: 0.85rem; line-height: 1.6; color: var(--text-muted);">
                    Select an algorithm to begin live streaming data steps.
                </div>
            </div>
        </aside>

        <!-- Footer -->
        <footer class="cockpit-footer">
            <div class="code-panel">
                <div id="pseudo-container">
                    <div class="code-line">// digital system ready...</div>
                </div>
            </div>

            <div class="control-bar">
                <div class="playback-btns">
                    <button class="btn-ctrl" onclick="location.reload()" title="Reset Session">↺</button>
                    <button class="btn-ctrl btn-primary-ctrl" onclick="location.reload()" title="Restart Current">▶</button>
                    <button class="btn-ctrl" onclick="document.body.classList.toggle('light-ui')" title="Toggle Mode">☼</button>
                </div>
                <div style="width: 100%;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
                        <span style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted); opacity: 0.6;">PULSE DELAY</span>
                        <span id="speed-value" style="font-family: 'Space Mono'; font-size: 0.7rem; color: var(--primary);">100ms</span>
                    </div>
                    <input type="range" id="speed-slider" min="5" max="500" value="100" style="width: 100%; accent-color: var(--primary);">
                </div>
            </div>
        </footer>
    </div>

    <script>
        const algoMetadata = {
            'Merge Sort': { complexity: 'n log n', space: 'n', pseudo: ["mergeSort(arr, l, r)", "  if l < r:", "    m = l+(r-l)/2", "    mergeSort(arr, l, m)", "    mergeSort(arr, m+1, r)", "    merge(arr, l, m, r)"] },
            'Quick Sort': { complexity: 'n log n', space: 'log n', pseudo: ["quickSort(arr, low, high)", "  if low < high:", "    pi = partition(arr, low, high)", "    quickSort(arr, low, pi - 1)", "    quickSort(arr, pi + 1, high)"] },
            'Bubble Sort': { complexity: 'n²', space: '1', pseudo: ["for i from 0 to n-1:", "  for j from 0 to n-i-1:", "    if arr[j] > arr[j+1]:", "      swap(arr[j], arr[j+1])"] },
            'Insertion Sort': { complexity: 'n²', space: '1', pseudo: ["for i from 1 to n:", "  key = arr[i]", "  j = i - 1", "  while j >= 0 and arr[j] > key:", "    arr[j+1] = arr[j]", "    j = j - 1", "  arr[j+1] = key"] },
            'Heap Sort': { complexity: 'n log n', space: '1', pseudo: ["buildMaxHeap(arr)", "for i from n-1 down to 1:", "  swap(arr[0], arr[i])", "  heapify(arr, 0, i)"] },
            'BST': { complexity: 'log n', space: 'h', pseudo: ["insert(root, key):", "  if root is null: return Node(key)", "  if key < root.key: root.left = insert(root.left, key)", "  else: root.right = insert(root.right, key)", "  return root"] },
            'Knapsack': { complexity: 'nW', space: 'nW', pseudo: ["for i from 1 to n:", "  for w from 1 to W:", "    if w[i] <= w:", "      dp[i][w] = max(v[i] + dp[i-1][w-w[i]], dp[i-1][w])", "    else: dp[i][w] = dp[i-1][w]"] },
            'Matrix Chain': { complexity: 'n³', space: 'n²', pseudo: ["for L from 2 to n:", "  for i from 1 to n-L+1:", "    j = i + L - 1", "    for k from i to j-1:", "      q = m[i][k] + m[k+1][j] + p[i-1]p[k]p[j]"] },
            'Huffman': { complexity: 'n log n', space: 'n', pseudo: ["while Q.size > 1:", "  l = Q.pop()", "  r = Q.pop()", "  node = merge(l, r)", "  Q.push(node)"] }
        };

        const statusElement = document.getElementById('status-info');
        const activeAlgoName = document.getElementById('active-algo-name');
        const timeComp = document.getElementById('time-complexity');
        const spaceComp = document.getElementById('space-complexity');
        const stepDesc = document.getElementById('step-desc');
        const pseudoContainer = document.getElementById('pseudo-container');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        let animationSpeed = parseInt(speedSlider.value);
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        speedSlider.oninput = function() {
            animationSpeed = parseInt(this.value);
            speedValue.innerText = `${this.value}ms`;
        };

        function updateMetadata(name) {
            const meta = algoMetadata[name] || { complexity: '—', space: '—', pseudo: ["// initialization..."] };
            activeAlgoName.textContent = name;
            timeComp.textContent = `O(${meta.complexity})`;
            spaceComp.textContent = `O(${meta.space})`;
            
            pseudoContainer.innerHTML = '';
            meta.pseudo.forEach((line, idx) => {
                const div = document.createElement('div');
                div.className = 'code-line';
                div.id = `pseudo-L${idx}`;
                div.textContent = line;
                pseudoContainer.appendChild(div);
            });
        }

        function highlightPseudo(lineIdx) {
            document.querySelectorAll('.code-line').forEach(l => l.classList.remove('active'));
            const el = document.getElementById(`pseudo-L${lineIdx}`);
            if (el) el.classList.add('active');
        }

        function setView(active) {
            const containers = ['bar-container', 'tree-container', 'knapsack-container', 'mcm-container', 'huffman-container'];
            containers.forEach(c => {
                const el = document.getElementById(c);
                if (c.includes(active)) {
                    el.style.display = (active === 'bar') ? 'flex' : (active === 'tree' ? 'block' : 'flex');
                } else if (c === 'mcm-container' && active === 'mcm') {
                     el.style.display = 'flex';
                } else if (c === 'huffman-container' && active === 'huffman') {
                     el.style.display = 'flex';
                } else {
                    el.style.display = 'none';
                }
            });
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(active.toLowerCase()) || 
                                (active === 'bar' && btn.parentElement.parentElement.innerHTML.includes('Sorting')));
            });
        }

        // Sorting
        async function runSortViz(endpoint, algoName) {
            setView('bar');
            updateMetadata(algoName);
            statusElement.innerText = "RUNNING";
            
            const barsContainer = document.getElementById('bar-container');
            barsContainer.innerHTML = '';
            let arr = [120, 350, 50, 560, 200, 410, 80, 5, 290, 480, 150, 310, 220, 600, 100, 450, 30, 520, 180, 390];
            const maxVal = Math.max(...arr);
            arr.forEach(v => {
                const b = document.createElement('div');
                b.className = 'bar';
                b.style.height = `${(v / maxVal) * 100}%`;
                barsContainer.appendChild(b);
            });
            const bars = barsContainer.getElementsByClassName('bar');

            const response = await fetch(endpoint);
            const data = await response.json();

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CMP') {
                    const i = parseInt(parts[1]), j = parseInt(parts[2]);
                    bars[i]?.classList.add('comparing');
                    bars[j]?.classList.add('comparing');
                    stepDesc.innerText = `Comparative analysis of indices ${i} and ${j}.`;
                    highlightPseudo(2);
                    await sleep(animationSpeed);
                    bars[i]?.classList.remove('comparing');
                    bars[j]?.classList.remove('comparing');
                } else if (parts[0] === 'UPD') {
                    const i = parseInt(parts[1]), val = parseInt(parts[2]);
                    if(bars[i]) {
                        bars[i].style.height = `${(val / maxVal) * 100}%`;
                        bars[i].classList.add('active-step');
                    }
                    stepDesc.innerText = `Memory update: index ${i} set to ${val}.`;
                    highlightPseudo(3);
                    await sleep(animationSpeed);
                    if(bars[i]) bars[i].classList.remove('active-step');
                }
            }
            for (let b of bars) b.classList.add('sorted');
            statusElement.innerText = "SUCCESS";
        }

        window.startMergeSort = () => runSortViz('/mergesort', 'Merge Sort');
        window.startQuickSort = () => runSortViz('/quicksort', 'Quick Sort');
        window.startHeapSort = () => runSortViz('/heapsort', 'Heap Sort');
        window.startbubbleSort = () => runSortViz('/bubblesort', 'Bubble Sort');
        window.startInsertionSort = () => runSortViz('/insertionsort', 'Insertion Sort');
        window.startSelectionSort = () => runSortViz('/selectionsort', 'Selection Sort');

        // Trees
        const treeNodes = {};
        const verticalGAP = 100;
        let treeBuilt = false;

        async function buildTree(svg, steps, animated) {
            svg.innerHTML = '';
            const centerX = svg.clientWidth / 2 || 400;
            const treeBaseGap = 200;

            for (const step of steps) {
                const parts = step.split(' ');
                if (parts[0] === 'NODE') {
                    const id = parts[1], val = parts[2], pid = parts[3], dir = parts[4];
                    let x, y;
                    if (pid === '-1') { x = centerX; y = 60; }
                    else {
                        const p = treeNodes[pid];
                        const depth = Math.floor((p.y - 60) / verticalGAP) + 1;
                        const xoffset = treeBaseGap / Math.pow(2, depth - 1);
                        x = (dir === 'L') ? p.x - xoffset : p.x + xoffset;
                        y = p.y + verticalGAP;
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                        line.setAttribute("x2", x); line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                    }
                    treeNodes[id] = { x, y, val };
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circ.setAttribute("cx", x); circ.setAttribute("cy", y); circ.classList.add("node");
                    circ.setAttribute("id", `node-${id}`);
                    g.appendChild(circ);
                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", x); txt.setAttribute("y", y + 5); txt.classList.add("node-text");
                    txt.setAttribute("text-anchor", "middle"); txt.textContent = val;
                    g.appendChild(txt);
                    svg.appendChild(g);
                    if (animated) await sleep(animationSpeed);
                }
            }
            treeBuilt = true;
        }

        async function startTreeVisualizer(type) {
            setView('tree'); updateMetadata('BST');
            const svg = document.getElementById('tree-svg');
            if (type === 'build' || !treeBuilt) {
                const res = await fetch('/tree/build');
                const data = await res.json();
                await buildTree(svg, data.steps, type === 'build');
            }
            if (type !== 'build') {
                document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
                const res = await fetch(`/tree/${type}`);
                const data = await res.json();
                for (const step of data.steps) {
                    if (step.startsWith('ACT')) {
                        const id = step.split(' ')[1];
                        document.getElementById(`node-${id}`)?.classList.add('active');
                        await sleep(animationSpeed);
                    }
                }
            }
        }

        async function startKnapsack() {
            setView('knapsack'); updateMetadata('Knapsack');
            const res = await fetch('/knapsack');
            const data = await res.json();
            
            const dataPanel = document.getElementById('kp-data');
            const vizWrapper = document.getElementById('kp-viz-wrapper');
            dataPanel.innerHTML = '<h5>ORIGINAL DATA</h5><table class="data-table" id="kp-data-table"><tr><th>Item</th><th>Weight</th><th>Value</th></tr></table>';
            vizWrapper.innerHTML = '<table class="dp-table" id="kp-table"></table>';
            
            const table = document.getElementById('kp-table');
            const dTable = document.getElementById('kp-data-table');
            
            let n, W;
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') {
                    n = parseInt(parts[1]); W = parseInt(parts[2]);
                    for (let i = 0; i <= n; i++) {
                        const tr = document.createElement('tr');
                        for (let j = 0; j <= W; j++) {
                            const td = document.createElement('td');
                            td.id = `kp-${i}-${j}`; td.className = 'dp-cell'; td.textContent = '0';
                            tr.appendChild(td);
                        }
                        table.appendChild(tr);
                    }
                } else if (parts[0] === 'DEF') {
                    const i = parts[1], wt = parts[2], val = parts[3];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>#${i}</td><td>${wt}</td><td>${val}</td>`;
                    dTable.appendChild(tr);
                    stepDesc.innerText = `Adding item ${i}: weight ${wt}, value ${val}.`;
                    await sleep(animationSpeed);
                } else if (parts[0] === 'CELL') {
                    const i = parts[1], j = parts[2], val = parts[3];
                    const cell = document.getElementById(`kp-${i}-${j}`);
                    if(cell) {
                        cell.textContent = val; cell.classList.add('dp-filling');
                        stepDesc.innerText = `Calculating DP[${i}][${j}] = ${val}`;
                        await sleep(animationSpeed);
                        cell.classList.remove('dp-filling'); cell.classList.add('dp-filled');
                    }
                }
            }
        }

        async function startMCM() {
            setView('mcm'); updateMetadata('Matrix Chain');
            const res = await fetch('/mcm');
            const data = await res.json();
            
            const dimsPanel = document.getElementById('mcm-dims');
            const vizWrapper = document.getElementById('mcm-viz-wrapper');
            dimsPanel.innerHTML = '<h5>MATRIX DIMENSIONS</h5><div id="mcm-dim-list" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;"></div>';
            vizWrapper.innerHTML = '<table class="dp-table" id="mcm-table"></table>';
            
            const table = document.getElementById('mcm-table');
            const dimList = document.getElementById('mcm-dim-list');
            
            let n;
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') {
                    n = parseInt(parts[1]);
                    for (let i = 1; i <= n; i++) {
                        const tr = document.createElement('tr');
                        for (let j = 1; j <= n; j++) {
                            const td = document.createElement('td');
                            td.id = `mcm-${i}-${j}`; td.className = 'dp-cell'; td.textContent = (i === j) ? '0' : '—';
                            tr.appendChild(td);
                        }
                        table.appendChild(tr);
                    }
                } else if (parts[0] === 'DIM') {
                    const i = parts[1], r = parts[2], c = parts[3];
                    const div = document.createElement('div');
                    div.className = 'data-card';
                    div.style.padding = '5px 10px';
                    div.innerHTML = `M${i}: ${r}×${c}`;
                    dimList.appendChild(div);
                    stepDesc.innerText = `Matrix ${i} dimensions: ${r}x${c}`;
                    await sleep(animationSpeed);
                } else if (parts[0] === 'CELL') {
                    const i = parts[1], j = parts[2], val = parts[3];
                    const cell = document.getElementById(`mcm-${i}-${j}`);
                    if(cell) {
                        cell.textContent = val; cell.classList.add('dp-filling');
                        stepDesc.innerText = `Calculating MCM[${i}][${j}] = ${val}`;
                        await sleep(animationSpeed);
                        cell.classList.remove('dp-filling'); cell.classList.add('dp-filled');
                    }
                } else if (parts[0] === 'OPTIMAL') {
                    const val = parts[1], p = parts.slice(2).join(' ');
                    stepDesc.innerText = `Optimal Cost: ${val}. Sequence: ${p}`;
                    statusElement.innerText = "SUCCESS";
                }
            }
        }

        async function startHuffman() {
            setView('huffman'); updateMetadata('Huffman');
            const res = await fetch('/huffman');
            const data = await res.json();
            
            const dataPanel = document.getElementById('hf-data');
            const svg = document.getElementById('hf-svg');
            const codesPanel = document.getElementById('hf-codes');
            
            dataPanel.innerHTML = '<h5>CHARACTER FREQUENCIES</h5><div id="hf-freq-list" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;"></div>';
            svg.innerHTML = '';
            codesPanel.innerHTML = '';
            
            const freqList = document.getElementById('hf-freq-list');
            const hfNodes = {};
            const centerX = svg.clientWidth / 2 || 400;

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') {
                    // skip
                } else if (parts[0] === 'LEAF') {
                    const id = parts[1], ch = parts[2], fr = parts[3];
                    const div = document.createElement('div');
                    div.className = 'data-card';
                    div.style.padding = '5px 10px';
                    div.innerHTML = `'${ch}': ${fr}`;
                    freqList.appendChild(div);
                    stepDesc.innerText = `Adding leaf node for '${ch}' with frequency ${fr}`;
                    await sleep(animationSpeed);
                } else if (parts[0] === 'MERGE') {
                    const l = parts[1], r = parts[2], id = parts[3], freq = parts[4];
                    stepDesc.innerText = `Merging nodes ${l} and ${r} into new node ${id} (freq: ${freq})`;
                    await sleep(animationSpeed);
                } else if (parts[0] === 'TNODE') {
                    const id = parts[1], pid = parts[2], dir = parts[3], freq = parts[4], lbl = parts.slice(5).join(' ');
                    let x, y;
                    if (pid === '-1') { x = centerX; y = 40; }
                    else {
                        const p = hfNodes[pid];
                        const depth = Math.floor((p.y - 40) / 70) + 1;
                        const xoffset = 200 / Math.pow(2, depth - 1);
                        x = (dir === 'L') ? p.x - xoffset : p.x + xoffset;
                        y = p.y + 70;
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                        line.setAttribute("x2", x); line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                        
                        const bit = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        bit.setAttribute("x", (p.x + x) / 2); bit.setAttribute("y", (p.y + y) / 2 - 5);
                        bit.setAttribute("text-anchor", "middle"); bit.style.fontSize = "10px";
                        bit.style.fill = "var(--primary)"; bit.textContent = (dir === 'L' ? '0' : '1');
                        svg.appendChild(bit);
                    }
                    hfNodes[id] = { x, y };
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circ.setAttribute("cx", x); circ.setAttribute("cy", y); circ.classList.add("node");
                    circ.setAttribute("r", "18");
                    g.appendChild(circ);
                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", x); txt.setAttribute("y", y + 4); txt.classList.add("node-text");
                    txt.setAttribute("text-anchor", "middle"); txt.style.fontSize = "10px";
                    txt.textContent = lbl === '*' ? freq : `${lbl}:${freq}`;
                    g.appendChild(txt);
                    svg.appendChild(g);
                    await sleep(animationSpeed / 2);
                } else if (parts[0] === 'CODE') {
                    const ch = parts[1], code = parts[2];
                    const div = document.createElement('div');
                    div.className = 'data-card';
                    div.style.border = '1px solid var(--primary)';
                    div.innerHTML = `<b>${ch}:</b> ${code}`;
                    codesPanel.appendChild(div);
                } else if (parts[0] === 'DONE') {
                    statusElement.innerText = "SUCCESS";
                }
            }
        }
    </script>
</body>
</html>
