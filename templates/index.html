<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Visualizer</title>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>DAA Visualizer</h1>
        </div>

        <div class="buttons">
            <div class="button-group">
                <button onclick="startMergeSort()">Merge Sort</button>
                <button onclick="startQuickSort()">Quick Sort</button>
                <button onclick="startHeapSort()">Heap Sort</button>
                <button onclick="startbubbleSort()">Bubble Sort</button>
                <button onclick="startInsertionSort()">Insertion Sort</button>
                <button onclick="startSelectionSort()">Selection Sort</button>
            </div>
            <div class="button-group" style="margin-top: 1rem; grid-template-columns: repeat(4, 1fr);">
                <button onclick="startTreeVisualizer('build')" style="background: #10b981;">BST: Build</button>
                <button onclick="startTreeVisualizer('inorder')" style="background: #059669;">BST: Inorder</button>
                <button onclick="startTreeVisualizer('preorder')" style="background: #047857;">BST: Preorder</button>
                <button onclick="startTreeVisualizer('postorder')" style="background: #065f46;">BST: Postorder</button>
            </div>
            <div class="speed-control">
                <label for="speed-slider">Animation Speed</label>
                <input type="range" id="speed-slider" min="1" max="400" value="50">
                <span id="speed-value">50ms</span>
            </div>
        </div>

        <div id="status-info" class="status-info"></div>

        <div id="bar-container" class="bar-container">
            <!-- Bars will be generated here -->
        </div>

        <div id="tree-container" class="tree-container" style="display: none;">
            <svg id="tree-svg" width="100%" height="500"></svg>
        </div>
    </div>

    <script>
        const algoMetadata = {
            'Merge Sort': {
                complexity: 'O(n log n)', case: 'Stable'
            },
            'Quick Sort': {
                complexity: 'O(n log n)', case: 'Unstable'
            },
            'Bubble Sort': {
                complexity: 'O(n^2)', case: 'Stable'
            },
            'Insertion Sort': {
                complexity: 'O(n^2)', case: 'Stable'
            },
            'Selection Sort': {
                complexity: 'O(n^2)', case: 'Unstable'
            }
        };

        const nodeCoords = {};
        const verticalGAP = 80;
        const initialHorizontalGAP = 200;


        function getpos(parentX, parentY, depth, direction) {
            const xoffset = initialHorizontalGAP / Math.pow(2, depth - 1);
            const x = (direction === 'L') ? parentX - xoffset : parentX + xoffset;
            const y = parentY + verticalGAP;
            return { x, y };
        }


        const container = document.getElementById('bar-container');
        const statusElement = document.getElementById('status-info');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        let animationSpeed = parseInt(speedSlider.value);
        let array = [120, 350, 50, 560, 200, 410, 80, 5, 290, 480, 150, 310, 220, 600, 100, 450, 30, 520, 180, 390];

        speedSlider.oninput = function () {
            animationSpeed = parseInt(this.value);
            speedValue.innerText = `${this.value}ms`;
        }

        function createBars() {
            container.innerHTML = '';
            statusElement.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 0.5}px`;
                container.appendChild(bar);
            });
        }

        function onSortComplete(algoName) {
            const meta = algoMetadata[algoName];
            statusElement.innerHTML = `
                <span class="success-text">Array Sorted!</span>
                <span class="complexity-info">Time Complexity: ${meta.complexity}</span>
            `;
        }


        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));


        async function startSelectionSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/selectionsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(" ");
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Selection Sort');
        }

        async function startInsertionSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/insertionsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar')

            for (const step of data.steps) {
                const parts = step.split(" ");
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Insertion Sort');
        }


        async function startHeapSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/heapsort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Heap Sort');
        }

        async function startMergeSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/mergesort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }

            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Merge Sort');
        }


        async function startbubbleSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/bubblesort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar')

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type == 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type == 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Bubble Sort');
        }

        async function startQuickSort() {
            document.getElementById('tree-container').style.display = 'none';
            container.style.display = 'flex';
            const response = await fetch('/quicksort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    bars[i].style.backgroundColor = '#f59e0b';
                    bars[j].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                    bars[j].style.backgroundColor = '#6366f1';
                } else if (type === 'UPD') {
                    bars[i].style.height = `${j * 0.5}px`;
                    bars[i].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Quick Sort');
        }

        async function startTreeVisualizer(type = 'build') {
            container.style.display = 'none';
            document.getElementById('tree-container').style.display = 'block';
            statusElement.innerHTML = `<span class="complexity-info">Running ${type.toUpperCase()}...</span>`;
            
            const response = await fetch(`/tree/${type}`);
            const data = await response.json();
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = ''; // Clear previous
            
            const nodes = {}; // Store node positions
            const centerX = svg.clientWidth / 2 || 450;
            
            for (const step of data.steps) {
                const parts = step.split(' ');
                const stepType = parts[0];
                
                if (stepType === 'NODE') {
                    const id = parts[1];
                    const val = parts[2];
                    const pid = parts[3];
                    const dir = parts[4];
                    
                    let x, y;
                    if (pid === '-1') {
                        x = centerX;
                        y = 50;
                    } else {
                        const parent = nodes[pid];
                        const depth = Math.floor((parent.y - 50) / verticalGAP) + 1;
                        const pos = getpos(parent.x, parent.y, depth, dir);
                        x = pos.x;
                        y = pos.y;
                        
                        // Draw Edge
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", parent.x);
                        line.setAttribute("y1", parent.y);
                        line.setAttribute("x2", x);
                        line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                    }
                    
                    nodes[id] = { x, y, val };
                    
                    // Draw Node Circle
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", x);
                    circle.setAttribute("cy", y);
                    circle.setAttribute("r", 20);
                    circle.setAttribute("id", `node-${id}`);
                    circle.classList.add("node");
                    svg.appendChild(circle);
                    
                    // Draw Node Text
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x);
                    text.setAttribute("y", y + 5);
                    text.setAttribute("text-anchor", "middle");
                    text.classList.add("node-text");
                    text.textContent = val;
                    svg.appendChild(text);
                    
                    await sleep(animationSpeed);
                    
                } else if (stepType === 'CMP') {
                    const id = parts[1];
                    const nodeEl = document.getElementById(`node-${id}`);
                    if (nodeEl) {
                        nodeEl.classList.add('comparing');
                        await sleep(animationSpeed);
                        nodeEl.classList.remove('comparing');
                    }
                } else if (stepType === 'ACT') {
                    const id = parts[1];
                    const nodeEl = document.getElementById(`node-${id}`);
                    if (nodeEl) {
                        nodeEl.classList.add('active');
                        await sleep(animationSpeed);
                    }
                }
            }
            statusElement.innerHTML = `<span class="success-text">${type.toUpperCase()} Operations Complete!</span>`;
        }

        createBars();
    </script>
</body>

</html>
