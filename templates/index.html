<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Visualizer | Digital Astral</title>
</head>
<body>
    <div class="cockpit">
        <!-- Sidebar: Algorithm Selection -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 8px;"></div>
                <h1>DAA LAB</h1>
            </div>
            
            <nav class="nav-section">
                <h3>Sorting</h3>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="startMergeSort()">Merge Sort</button>
                    <button class="nav-btn" onclick="startQuickSort()">Quick Sort</button>
                    <button class="nav-btn" onclick="startHeapSort()">Heap Sort</button>
                    <button class="nav-btn" onclick="startbubbleSort()">Bubble Sort</button>
                    <button class="nav-btn" onclick="startInsertionSort()">Insertion Sort</button>
                    <button class="nav-btn" onclick="startSelectionSort()">Selection Sort</button>
                </div>
            </nav>

            <nav class="nav-section">
                <h3>Trees</h3>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="startTreeVisualizer('build')">BST: Build</button>
                    <button class="nav-btn" onclick="startTreeVisualizer('inorder')">BST: Inorder</button>
                    <button class="nav-btn" onclick="startTreeVisualizer('preorder')">BST: Preorder</button>
                    <button class="nav-btn" onclick="startTreeVisualizer('postorder')">BST: Postorder</button>
                </div>
            </nav>

            <nav class="nav-section">
                <h3>Advanced</h3>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="startKnapsack()">⚖️ 0/1 Knapsack</button>
                    <button class="nav-btn" onclick="startMCM()">🧩 Matrix Chain</button>
                    <button class="nav-btn" onclick="startHuffman()">🌳 Huffman Coding</button>
                </div>
            </nav>
        </aside>

        <!-- Header -->
        <header class="header">
            <div class="current-algo-title" id="active-algo-name">Select an Algorithm</div>
            <div class="header-status">
                <div id="status-info" class="status-info">Ready to visualize</div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <div id="viz-glass" class="glass-panel" style="display: flex;">
                <div id="bar-container" class="bar-container" style="display: none;"></div>
                <div id="tree-container" class="tree-container" style="display: none; width: 100%; height: 100%;">
                    <svg id="tree-svg" width="100%" height="100%"></svg>
                </div>
                <div id="knapsack-container" class="knapsack-container" style="display: none;"></div>
                <div id="mcm-container" class="mcm-container" style="display: none;"></div>
                <div id="huffman-container" class="huffman-container" style="display: none;"></div>
            </div>
        </main>

        <!-- Right Panel: Data and Complexity -->
        <aside class="data-panel">
            <div class="data-card">
                <h4>Analysis</h4>
                <div class="complexity-grid">
                    <div class="metric">
                        <b>Time</b>
                        <span id="time-complexity">—</span>
                    </div>
                    <div class="metric">
                        <b>Space</b>
                        <span id="space-complexity">—</span>
                    </div>
                </div>
            </div>

            <div class="data-card" style="flex: 1; overflow-y: auto;">
                <h4>Step Description</h4>
                <div id="step-desc" style="font-size: 0.8125rem; color: var(--text-muted); line-height: 1.5;">
                    Select an algorithm to begin the visualization process.
                </div>
            </div>
        </aside>

        <!-- Footer: Code and Controls -->
        <footer class="cockpit-footer">
            <div class="code-panel">
                <div id="pseudo-container">
                    <!-- Pseudocode lines will be injected here -->
                    <div class="code-line">// Select an algorithm to see logic</div>
                </div>
            </div>

            <div class="control-bar">
                <div class="playback-btns">
                    <button class="btn-ctrl"><i class="icon-prev"></i></button>
                    <button class="btn-ctrl btn-primary-ctrl" onclick="location.reload()">↺</button>
                    <button class="btn-ctrl"><i class="icon-next"></i></button>
                </div>
                <div class="speed-slider-container">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-size: 0.6875rem; color: var(--text-muted); font-weight: 700;">ANIMATION DELAY</span>
                        <span id="speed-value" style="font-family: 'Space Mono', monospace; font-size: 0.6875rem; color: var(--primary);">50ms</span>
                    </div>
                    <input type="range" id="speed-slider" min="1" max="400" value="50">
                </div>
            </div>
        </footer>
    </div>

    <script>
        const algoMetadata = {
            'Merge Sort': { complexity: 'O(n log n)', space: 'O(n)', pseudo: [
                "function mergeSort(arr):",
                "  if len(arr) <= 1: return arr",
                "  mid = len(arr) / 2",
                "  left = mergeSort(arr[:mid])",
                "  right = mergeSort(arr[mid:])",
                "  return merge(left, right)"
            ]},
            'Quick Sort': { complexity: 'O(n log n)', space: 'O(log n)', pseudo: [
                "function quickSort(arr, low, high):",
                "  if low < high:",
                "    pivot = partition(arr, low, high)",
                "    quickSort(arr, low, pivot - 1)",
                "    quickSort(arr, pivot + 1, high)"
            ]},
            'Bubble Sort': { complexity: 'O(n²)', space: 'O(1)', pseudo: [
                "for i from 0 to n-1:",
                "  for j from 0 to n-i-1:",
                "    if arr[j] > arr[j+1]:",
                "      swap(arr[j], arr[j+1])"
            ]},
            'Insertion Sort': { complexity: 'O(n²)', space: 'O(1)', pseudo: [
                "for i from 1 to n:",
                "  key = arr[i]",
                "  j = i - 1",
                "  while j >= 0 and arr[j] > key:",
                "    arr[j+1] = arr[j]",
                "    j = j - 1",
                "  arr[j+1] = key"
            ]},
            'Selection Sort': { complexity: 'O(n²)', space: 'O(1)', pseudo: [
                "for i from 0 to n-1:",
                "  min_idx = i",
                "  for j from i+1 to n:",
                "    if arr[j] < arr[min_idx]:",
                "      min_idx = j",
                "  swap(arr[i], arr[min_idx])"
            ]},
            'Heap Sort': { complexity: 'O(n log n)', space: 'O(1)', pseudo: [
                "buildMaxHeap(arr)",
                "for i from n-1 down to 1:",
                "  swap(arr[0], arr[i])",
                "  heapify(arr, 0, i)"
            ]},
            'BST': { complexity: 'O(log n)', space: 'O(h)', pseudo: [
                "function insert(root, key):",
                "  if root is null: return Node(key)",
                "  if key < root.key:",
                "    root.left = insert(root.left, key)",
                "  else:",
                "    root.right = insert(root.right, key)",
                "  return root"
            ]},
            'Knapsack': { complexity: 'O(nW)', space: 'O(nW)', pseudo: [
                "for i from 0 to n:",
                "  for w from 0 to W:",
                "    if w[i] <= w:",
                "      dp[i][w] = max(v[i] + dp[i-1][w-w[i]], dp[i-1][w])",
                "    else:",
                "      dp[i][w] = dp[i-1][w]"
            ]},
            'Matrix Chain': { complexity: 'O(n³)', space: 'O(n²)', pseudo: [
                "for len from 2 to n:",
                "  for i from 1 to n-len+1:",
                "    j = i + len - 1",
                "    m[i][j] = infinity",
                "    for k from i to j-1:",
                "      q = m[i][k] + m[k+1][j] + p[i-1]p[k]p[j]",
                "      if q < m[i][j]: m[i][j] = q"
            ]},
            'Huffman': { complexity: 'O(n log n)', space: 'O(n)', pseudo: [
                "while Q.size > 1:",
                "  left = Q.extractMin()",
                "  right = Q.extractMin()",
                "  new_node = merge(left, right)",
                "  Q.insert(new_node)"
            ]}
        };

        const statusElement = document.getElementById('status-info');
        const activeAlgoName = document.getElementById('active-algo-name');
        const timeComp = document.getElementById('time-complexity');
        const spaceComp = document.getElementById('space-complexity');
        const stepDesc = document.getElementById('step-desc');
        const pseudoContainer = document.getElementById('pseudo-container');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        let animationSpeed = parseInt(speedSlider.value);
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        speedSlider.oninput = function() {
            animationSpeed = parseInt(this.value);
            speedValue.innerText = `${this.value}ms`;
        };

        function updateMetadata(name) {
            const meta = algoMetadata[name] || { complexity: '—', space: '—', pseudo: ["// No logic available"] };
            activeAlgoName.textContent = name;
            timeComp.textContent = meta.complexity;
            spaceComp.textContent = meta.space;
            
            pseudoContainer.innerHTML = '';
            meta.pseudo.forEach((line, idx) => {
                const div = document.createElement('div');
                div.className = 'code-line';
                div.id = `pseudo-L${idx}`;
                div.textContent = line;
                pseudoContainer.appendChild(div);
            });
        }

        function highlightPseudo(lineIdx) {
            document.querySelectorAll('.code-line').forEach(l => l.classList.remove('active'));
            const el = document.getElementById(`pseudo-L${lineIdx}`);
            if (el) el.classList.add('active');
        }

        function setView(active) {
            // Updated for cockpit layout
            document.getElementById('viz-glass').style.display = 'flex';
            document.getElementById('bar-container').style.display = (active === 'bars') ? 'flex' : 'none';
            document.getElementById('tree-container').style.display = (active === 'tree') ? 'block' : 'none';
            document.getElementById('knapsack-container').style.display = (active === 'knapsack') ? 'block' : 'none';
            document.getElementById('mcm-container').style.display = (active === 'mcm') ? 'block' : 'none';
            document.getElementById('huffman-container').style.display = (active === 'huffman') ? 'block' : 'none';
            
            // Highlight nav button
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(active === 'bars' ? 'Sort' : active.toUpperCase()));
            });
        }

        // Sorting Logic Integration
        async function runSortViz(endpoint, algoName) {
            setView('bars');
            updateMetadata(algoName);
            statusElement.innerText = "Running " + algoName + "...";
            stepDesc.innerText = "Initializing array and streaming steps from C++ backend.";
            
            const barsContainer = document.getElementById('bar-container');
            barsContainer.innerHTML = '';
            let arr = [120, 350, 50, 560, 200, 410, 80, 5, 290, 480, 150, 310, 220, 600, 100, 450, 30, 520, 180, 390];
            arr.forEach(v => {
                const b = document.createElement('div');
                b.className = 'bar';
                b.style.height = `${v * 0.15}px`;
                barsContainer.appendChild(b);
            });
            const bars = barsContainer.getElementsByClassName('bar');

            const response = await fetch(endpoint);
            const data = await response.json();

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CMP') {
                    const i = parseInt(parts[1]), j = parseInt(parts[2]);
                    bars[i]?.classList.add('comparing');
                    bars[j]?.classList.add('comparing');
                    stepDesc.innerText = `Comparing index ${i} and ${j}.`;
                    highlightPseudo(2);
                    await sleep(animationSpeed);
                    bars[i]?.classList.remove('comparing');
                    bars[j]?.classList.remove('comparing');
                } else if (parts[0] === 'UPD') {
                    const i = parseInt(parts[1]), val = parseInt(parts[2]);
                    if(bars[i]) bars[i].style.height = `${val * 0.15}px`;
                    stepDesc.innerText = `Updating index ${i} to value ${val}.`;
                    highlightPseudo(3);
                    await sleep(animationSpeed);
                }
            }
            for (let b of bars) b.classList.add('sorted');
            statusElement.innerHTML = `<span style="color:var(--secondary)">${algoName} Sorted Successfully!</span>`;
            stepDesc.innerText = "Algorithm finished. Array is now in sorted order.";
        }

        window.startMergeSort = () => runSortViz('/mergesort', 'Merge Sort');
        window.startQuickSort = () => runSortViz('/quicksort', 'Quick Sort');
        window.startHeapSort = () => runSortViz('/heapsort', 'Heap Sort');
        window.startbubbleSort = () => runSortViz('/bubblesort', 'Bubble Sort');
        window.startInsertionSort = () => runSortViz('/insertionsort', 'Insertion Sort');
        window.startSelectionSort = () => runSortViz('/selectionsort', 'Selection Sort');

        // Trees
        const treeNodes = {};
        const verticalGAP = 80;
        let treeBuilt = false;

        async function buildTree(svg, steps, animated) {
            const nodeCount = steps.filter(s => s.startsWith('NODE')).length;
            const treeBaseGap = Math.max(220, nodeCount * 25);
            const centerX = svg.clientWidth / 2 || 450;
            const centerY = 50;

            for (const step of steps) {
                const parts = step.split(' ');
                if (parts[0] === 'NODE') {
                    const id = parts[1], val = parts[2], pid = parts[3], dir = parts[4];
                    let x, y;
                    if (pid === '-1') { x = centerX; y = centerY; }
                    else {
                        const p = treeNodes[pid];
                        const depth = Math.floor((p.y - centerY) / verticalGAP) + 1;
                        const xoffset = treeBaseGap / Math.pow(2, depth - 1);
                        x = (dir === 'L') ? p.x - xoffset : p.x + xoffset;
                        y = p.y + verticalGAP;
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                        line.setAttribute("x2", x);   line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                    }
                    treeNodes[id] = { x, y, val };
                    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circ.setAttribute("cx", x); circ.setAttribute("cy", y); circ.setAttribute("r", 20);
                    circ.setAttribute("id", `node-${id}`); circ.classList.add("node");
                    svg.appendChild(circ);
                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", x); txt.setAttribute("y", y + 5); txt.setAttribute("text-anchor", "middle");
                    txt.classList.add("node-text"); txt.textContent = val;
                    svg.appendChild(txt);
                    stepDesc.innerText = `Inserted node ${val} into the BST.`;
                    highlightPseudo(3);
                    if (animated) await sleep(animationSpeed);
                } else if (parts[0] === 'CMP' && animated) {
                    const el = document.getElementById(`node-${parts[1]}`);
                    el?.classList.add('comparing');
                    await sleep(animationSpeed);
                    el?.classList.remove('comparing');
                }
            }
            treeBuilt = true;
        }

        async function startTreeVisualizer(type) {
            setView('tree');
            updateMetadata('BST');
            const svg = document.getElementById('tree-svg');
            if (type === 'build') {
                svg.innerHTML = '';
                Object.keys(treeNodes).forEach(k => delete treeNodes[k]);
                treeBuilt = false;
                const res = await fetch('/tree/build');
                const data = await res.json();
                await buildTree(svg, data.steps, true);
            } else {
                if (!treeBuilt) {
                    svg.innerHTML = '';
                    const res = await fetch('/tree/build');
                    const data = await res.json();
                    await buildTree(svg, data.steps, false);
                }
                document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
                const res = await fetch(`/tree/${type}`);
                const data = await res.json();
                for (const step of data.steps) {
                    if (step.startsWith('ACT')) {
                        const id = step.split(' ')[1];
                        document.getElementById(`node-${id}`)?.classList.add('active');
                        stepDesc.innerText = `Visiting node with value ${treeNodes[id]?.val || '?'}.`;
                        await sleep(animationSpeed);
                    }
                }
            }
            statusElement.innerText = type.toUpperCase() + " Complete";
        }

        // Advanced Algorithms (Re-implemented with new UI support)
        async function startKnapsack() {
            setView('knapsack'); updateMetadata('Knapsack');
            const response = await fetch('/knapsack');
            const data = await response.json();
            const kDiv = document.getElementById('knapsack-container');
            kDiv.innerHTML = '<table class="dp-table" id="kp-table"></table>';
            const table = document.getElementById('kp-table');
            
            let n = 0, W = 0;
            const itemDefs = {};
            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CONFIG') { n = parseInt(parts[1]); W = parseInt(parts[2]); }
                else if (parts[0] === 'DEF') { itemDefs[parseInt(parts[1])] = { w: parseInt(parts[2]), v: parseInt(parts[3]) }; }
            }

            const hdr = document.createElement('tr');
            hdr.innerHTML = '<th class="dp-cell">Item\\Cap</th>' + Array.from({length: W + 1}, (_, i) => `<th class="dp-cell">${i}</th>`).join('');
            table.appendChild(hdr);

            for (let i = 0; i <= n; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="dp-cell">${i === 0 ? '∅' : 'I'+i}</td>` + Array.from({length: W + 1}, (_, j) => `<td class="dp-cell" id="kp-${i}-${j}">–</td>`).join('');
                table.appendChild(tr);
            }

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CELL') {
                    const i = parts[1], j = parts[2], val = parts[3];
                    const cell = document.getElementById(`kp-${i}-${j}`);
                    if (cell) {
                        cell.textContent = val;
                        cell.classList.add('dp-filling');
                        stepDesc.innerText = `Calculating dp[${i}][${j}] = ${val}.`;
                        highlightPseudo(3);
                        await sleep(animationSpeed);
                        cell.classList.remove('dp-filling');
                        cell.classList.add('dp-filled');
                    }
                } else if (parts[0] === 'PICK') {
                    const i = parts[1];
                    stepDesc.innerText = `Backtracking: Item ${i} was picked.`;
                    highlightPseudo(3);
                    await sleep(animationSpeed);
                }
            }
            statusElement.innerText = "Knapsack Complete";
        }

        async function startMCM() {
            setView('mcm'); updateMetadata('Matrix Chain');
            const response = await fetch('/mcm');
            const data = await response.json();
            const container = document.getElementById('mcm-container');
            container.innerHTML = '<table class="dp-table" id="mcm-table"></table>';
            const table = document.getElementById('mcm-table');
            
            let n = 0;
            for (const step of data.steps) if (step.startsWith('CONFIG')) n = parseInt(step.split(' ')[1]);

            for (let i = 1; i <= n; i++) {
                const tr = document.createElement('tr');
                for (let j = 1; j <= n; j++) {
                    const td = document.createElement('td');
                    td.id = `mcm-${i}-${j}`;
                    td.className = 'dp-cell';
                    if (i > j) td.style.opacity = '0.2';
                    else if (i === j) td.textContent = '0';
                    else td.textContent = '∞';
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'CELL') {
                    const i = parts[1], j = parts[2], val = parts[3];
                    const cell = document.getElementById(`mcm-${i}-${j}`);
                    if (cell) {
                        cell.textContent = val;
                        cell.classList.add('dp-filling');
                        stepDesc.innerText = `Filling MCM cell [${i},${j}] with cost ${val}.`;
                        highlightPseudo(5);
                        await sleep(animationSpeed);
                        cell.classList.remove('dp-filling');
                        cell.classList.add('dp-filled');
                    }
                }
            }
            statusElement.innerText = "MCM Complete";
        }

        async function startHuffman() {
            setView('huffman'); updateMetadata('Huffman');
            const response = await fetch('/huffman');
            const data = await response.json();
            const container = document.getElementById('huffman-container');
            container.innerHTML = '<div class="huff-queue" id="huff-q"></div><div class="tree-container"><svg id="huff-svg" width="100%" height="300"></svg></div>';
            const q = document.getElementById('huff-q');
            const svg = document.getElementById('huff-svg');
            const centerX = svg.clientWidth / 2 || 400;
            const hNodes = {};

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts[0] === 'LEAF') {
                    const card = document.createElement('div');
                    card.className = 'metric';
                    card.style.background = 'var(--surface-container-high)';
                    card.style.padding = '0.5rem';
                    card.style.borderRadius = '4px';
                    card.innerHTML = `<b>${parts[2]}</b><span>${parts[3]}</span>`;
                    q.appendChild(card);
                } else if (parts[0] === 'TNODE') {
                    const id = parts[1], pid = parts[2], dir = parts[3], fr = parts[4], lbl = parts[5];
                    let x, y;
                    if (pid === '-1') { x = centerX; y = 30; }
                    else {
                        const p = hNodes[pid];
                        const depth = Math.floor((p.y - 30) / 60) + 1;
                        const xoffset = 120 / Math.pow(2, depth - 1);
                        x = (dir === 'L') ? p.x - xoffset : p.x + xoffset;
                        y = p.y + 60;
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
                        line.setAttribute("x2", x);   line.setAttribute("y2", y);
                        line.classList.add("edge");
                        svg.appendChild(line);
                    }
                    hNodes[id] = { x, y };
                    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circ.setAttribute("cx", x); circ.setAttribute("cy", y); circ.setAttribute("r", 15);
                    circ.className.baseVal = "node";
                    svg.appendChild(circ);
                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", x); txt.setAttribute("y", y + 4); txt.setAttribute("text-anchor", "middle");
                    txt.classList.add("node-text"); txt.textContent = lbl === '*' ? fr : lbl;
                    svg.appendChild(txt);
                    stepDesc.innerText = `Merging/Creating node for ${lbl === '*' ? 'internal' : lbl} with freq ${fr}.`;
                    highlightPseudo(3);
                    await sleep(animationSpeed);
                }
            }
            statusElement.innerText = "Huffman Complete";
        }
    </script>
</body>
</html>
