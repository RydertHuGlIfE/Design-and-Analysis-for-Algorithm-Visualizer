<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Visualizer</title>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>DAA Visualizer</h1>
        </div>

        <div class="buttons">
            <div class="button-group">
                <button onclick="startMergeSort()">Merge Sort</button>
                <button onclick="startQuickSort()">Quick Sort</button>
                <button>Heap Sort</button>
                <button>Bubble Sort</button>
                <button>Insertion Sort</button>
                <button>Selection Sort</button>
            </div>
            <div class="speed-control">
                <label for="speed-slider">Animation Speed</label>
                <input type="range" id="speed-slider" min="1" max="200" value="50">
                <span id="speed-value">50ms</span>
            </div>
        </div>

        <div id="status-info" class="status-info"></div>

        <div id="bar-container" class="bar-container">
            <!-- Bars will be generated here -->
        </div>
    </div>

    <script>
        const algoMetadata = {
            'Merge Sort': {
                complexity: 'O(n log n)', case: 'Stable'
            },
            'Quick Sort': {
                complexity: 'O(n log n)', case: 'Unstable'
            }
        };
        const container = document.getElementById('bar-container');
        const statusElement = document.getElementById('status-info');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        
        let animationSpeed = parseInt(speedSlider.value);
        let array = [120, 350, 50, 560, 200, 410, 80, 5, 290, 480, 150, 310, 220, 600, 100, 450, 30, 520, 180, 390];

        speedSlider.oninput = function() {
            animationSpeed = parseInt(this.value);
            speedValue.innerText = `${this.value}ms`;
        }

        function createBars() {
            container.innerHTML = '';
            statusElement.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 0.5}px`;
                container.appendChild(bar);
            });
        }

        function onSortComplete(algoName) {
            const meta = algoMetadata[algoName];
            statusElement.innerHTML = `
                <span class="success-text">Array Sorted!</span>
                <span class="complexity-info">Time Complexity: ${meta.complexity}</span>
            `;
        }


        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startMergeSort() {
            const response = await fetch('/mergesort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                if (parts.length < 3) continue;

                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    if (bars[i] && bars[j]) {
                        bars[i].style.backgroundColor = '#f59e0b';
                        bars[j].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                        bars[j].style.backgroundColor = '#6366f1';
                    }
                } else if (type === 'UPD') {
                    if (bars[i]) {
                        bars[i].style.height = `${j * 0.5}px`;
                        bars[i].style.backgroundColor = '#f59e0b';
                        await sleep(animationSpeed);
                        bars[i].style.backgroundColor = '#6366f1';
                    }
                }
            }

            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Merge Sort');
        }

        async function startQuickSort() {
            const response = await fetch('/quicksort');
            const data = await response.json();
            const bars = document.getElementsByClassName('bar');

            for (const step of data.steps) {
                const parts = step.split(' ');
                const type = parts[0];
                const i = parseInt(parts[1]);
                const j = parseInt(parts[2]);

                if (type === 'CMP') {
                    bars[i].style.backgroundColor = '#f59e0b';
                    bars[j].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                    bars[j].style.backgroundColor = '#6366f1';
                } else if (type === 'UPD') {
                    bars[i].style.height = `${j * 0.5}px`;
                    bars[i].style.backgroundColor = '#f59e0b';
                    await sleep(animationSpeed);
                    bars[i].style.backgroundColor = '#6366f1';
                }
            }
            for (let bar of bars) {
                bar.style.backgroundColor = '#10b981';
            }
            onSortComplete('Quick Sort');
        }

        createBars();
    </script>
</body>

</html>
